# ============================================
# GHOST PROXY - PROMETHEUS CONFIGURATION
# ============================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ghost-proxy'
    environment: 'production'

# ============================================
# ALERT MANAGER (optional)
# ============================================

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      # - targets:
      #   - alertmanager:9093

# ============================================
# RULE FILES
# ============================================

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# ============================================
# SCRAPE CONFIGS
# ============================================

scrape_configs:
  # --- Ghost Proxy Application ---
  - job_name: 'ghost-proxy'
    static_configs:
      - targets: ['ghost-proxy:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # --- Prometheus Self-Monitoring ---
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # --- Node Exporter (System Metrics) ---
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    # Uncomment if you add node-exporter to docker-compose

  # --- Redis Exporter ---
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    # Uncomment if you add redis-exporter to docker-compose

  # --- PostgreSQL Exporter ---
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    # Uncomment if you add postgres-exporter to docker-compose

# ============================================
# REMOTE WRITE (optional)
# ============================================

